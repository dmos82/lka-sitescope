services:
  # ─── API (Node.js Express) ────────────────────────────────────────────────
  - type: web
    name: lka-sitescope-api
    env: node
    region: oregon
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @lka/database exec prisma generate && pnpm --filter @lka/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4100
      - key: DATABASE_URL
        fromDatabase:
          name: lka-sitescope-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # Set manually after web deploy
      - key: NOMINATIM_CONTACT_EMAIL
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

databases:
  - name: lka-sitescope-db
    databaseName: lkasitescope
    user: lka
    region: oregon
    plan: starter
    postgresMajorVersion: 15
